<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baret</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!--
      Size the popup to exactly 360×600px.

      Chrome and Firefox both size the popup panel to the document's scrollable
      area — they read body (not html) for this. Setting the size on html alone
      is unreliable in Firefox: the panel can grow past 360px if content has
      wider intrinsic size. We set body + #root explicitly and overflow:hidden
      so the panel never exceeds 360×600 regardless of child content.

      index.css @layer base also touches html/body/root — the !important rules
      here win since inline <style> !important beats linked-stylesheet !important
      in the CSS cascade.

      When opened as a standalone sign/connect window (?popout=1) main.tsx sets
      data-popout on <html>, overriding body back to viewport-fill so the wallet
      spans the whole window rather than sitting in a 360×600 box.
    -->
    <style>
      html { margin: 0; padding: 0; }
      body {
        margin: 0 !important;
        padding: 0 !important;
        width: 360px !important;
        min-width: 360px !important;
        max-width: 360px !important;
        height: 600px !important;
        overflow: hidden !important;
      }
      #root {
        width: 100% !important;
        height: 100% !important;
        overflow: hidden;
      }
      /* Popout (sign/connect standalone window): fill the whole window. */
      html[data-popout="true"] body {
        width: 100vw !important;
        min-width: 0 !important;
        max-width: 100vw !important;
        height: 100vh !important;
        overflow: visible !important;
      }
      html[data-popout="true"] #root { overflow: visible; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
